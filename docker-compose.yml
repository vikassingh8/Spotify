# ============================================================
# Spoty — full local distributed stack (one command: docker compose up)
# Kafka (KRaft) + Spark + MinIO + Postgres + Redis + Express services
# + React frontend + NGINX gateway + Prometheus/Grafana
# ============================================================

name: spoty

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  networks: [spoty]

# Reusable healthcheck for Node services (reads $PORT inside the container).
x-node-health: &node-health
  test:
    [
      "CMD-SHELL",
      "node -e \"fetch('http://localhost:'+process.env.PORT+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
    ]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 25s

services:
  # ---------------------- Infrastructure ----------------------
  postgres:
    image: postgres:18-alpine
    <<: *service-defaults
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./data/seed:/docker-entrypoint-initdb.d:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    <<: *service-defaults
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:4.2.0
    <<: *service-defaults
    ports: ["29092:29092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    # Lightweight TCP port check — the JVM-based CLI probe can exceed the
    # healthcheck timeout on slower machines and falsely report unhealthy.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  minio:
    image: minio/minio:latest
    <<: *service-defaults
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----- one-shot: generate demo audio, then upload to MinIO -----
  audio-gen:
    image: python:3.12-slim
    networks: [spoty]
    volumes:
      - ./data/seed:/seed
    command: ["python", "/seed/make_audio.py"]
    restart: "no"

  minio-init:
    image: minio/mc:latest
    networks: [spoty]
    depends_on:
      minio:
        condition: service_healthy
      audio-gen:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - ./data/seed/audio:/audio:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      mc cp --recursive /audio/ local/$${MINIO_BUCKET}/ &&
      echo 'audio uploaded to bucket' "
    restart: "no"

  # ---------------------- Application services ----------------------
  auth-service:
    <<: *service-defaults
    build: ./services/auth-service
    environment:
      SERVICE_NAME: auth-service
      PORT: ${AUTH_PORT}
    healthcheck: *node-health
    depends_on:
      postgres: { condition: service_healthy }

  catalog-service:
    <<: *service-defaults
    build: ./services/catalog-service
    environment:
      SERVICE_NAME: catalog-service
      PORT: ${CATALOG_PORT}
    healthcheck: *node-health
    depends_on:
      postgres: { condition: service_healthy }

  playback-service:
    <<: *service-defaults
    build: ./services/playback-service
    environment:
      SERVICE_NAME: playback-service
      PORT: ${PLAYBACK_PORT}
    healthcheck: *node-health
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      minio: { condition: service_healthy }

  recommendation-service:
    <<: *service-defaults
    build: ./services/recommendation-service
    environment:
      SERVICE_NAME: recommendation-service
      PORT: ${RECOMMENDATION_PORT}
    healthcheck: *node-health
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  ingestion-producer:
    <<: *service-defaults
    build: ./services/ingestion-producer
    environment:
      SERVICE_NAME: ingestion-producer
      PORT: ${INGESTION_PORT}
    healthcheck: *node-health
    depends_on:
      kafka: { condition: service_healthy }
      catalog-service: { condition: service_healthy }

  stream-processor:
    <<: *service-defaults
    build: ./stream-processor
    depends_on:
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  # ---------------------- Edge / frontend ----------------------
  frontend:
    build: ./frontend
    networks: [spoty]
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    <<: *service-defaults
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${GATEWAY_HTTP_PORT}:80"
    depends_on:
      auth-service: { condition: service_healthy }
      catalog-service: { condition: service_healthy }
      playback-service: { condition: service_healthy }
      recommendation-service: { condition: service_healthy }
      frontend: { condition: service_started }

  # ---------------------- Observability ----------------------
  prometheus:
    image: prom/prometheus:latest
    networks: [spoty]
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    networks: [spoty]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  pgdata:
  miniodata:

networks:
  spoty:
    driver: bridge
