worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json text/css application/javascript;

    # Docker's embedded DNS. Using a variable in proxy_pass forces NGINX to
    # re-resolve at request time; Docker returns rotated A-records for a scaled
    # service, giving round-robin load balancing across all replicas.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # $upstream_addr records which replica served the request (LB evidence).
    log_format spoty '$remote_addr "$request" $status ${request_time}s -> $upstream_addr';
    access_log /var/log/nginx/access.log spoty;

    # proxy headers inherited by all locations
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name _;

        location /api/auth/ {
            set $u auth-service:4001;
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://$u;
        }
        location /api/catalog/ {
            set $u catalog-service:4002;
            rewrite ^/api/catalog/(.*)$ /$1 break;
            proxy_pass http://$u;
        }
        location /api/playback/ {
            set $u playback-service:4003;
            rewrite ^/api/playback/(.*)$ /$1 break;
            proxy_pass http://$u;
        }
        location /api/recommendations/ {
            set $u recommendation-service:4004;
            rewrite ^/api/recommendations/(.*)$ /$1 break;
            proxy_pass http://$u;
        }
        location /api/ingestion/ {
            set $u ingestion-producer:4005;
            rewrite ^/api/ingestion/(.*)$ /$1 break;
            proxy_pass http://$u;
        }

        # Static SPA frontend
        location / {
            set $u frontend:80;
            proxy_pass http://$u;
        }
    }
}
