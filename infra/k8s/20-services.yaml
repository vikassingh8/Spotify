apiVersion: apps/v1
kind: Deployment
metadata: { name: stream-processor, namespace: spoty }
spec:
  replicas: 1 # Spark driver (local[*]); scale via executors in a real cluster
  selector: { matchLabels: { app: stream-processor } }
  template:
    metadata: { labels: { app: stream-processor } }
    spec:
      containers:
        - name: stream-processor
          image: spoty-stream-processor:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: spoty-config }
            - secretRef: { name: spoty-secrets }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
