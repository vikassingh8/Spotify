# Application tier. Build images into the cluster first, e.g. with minikube:
#   eval $(minikube docker-env)
#   docker compose build   # tags images as spoty-<service>
# then set the image names below to match (or retag to spoty/<svc>:latest).
# Each Deployment requests CPU so the HorizontalPodAutoscaler can scale on it.

apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: spoty }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth-service
          image: spoty-auth-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: spoty-config }
            - secretRef: { name: spoty-secrets }
          env:
            - { name: SERVICE_NAME, value: auth-service }
            - { name: PORT, value: "4001" }
          ports: [{ containerPort: 4001 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 4001 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: spoty }
spec:
  selector: { app: auth-service }
  ports: [{ port: 4001, targetPort: 4001 }]
---
