# Horizontal Pod Autoscalers — demonstrate automatic horizontal scaling
# under load (requires metrics-server: `minikube addons enable metrics-server`).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: playback-hpa, namespace: spoty }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: playback-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: catalog-hpa, namespace: spoty }
spec:
